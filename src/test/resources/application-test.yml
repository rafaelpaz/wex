spring:
  # H2 In-Memory Database for test isolation
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Let Flyway manage schema; fall back to create-drop if needed
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  # Cache (same config, tests may override)
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=3600s

# Treasury API (tests will override with WireMock URL)
treasury:
  api:
    base-url: http://localhost:8080

# Logging - quieter for tests
logging:
  level:
    root: WARN
    com.wex.purchasetransactions: INFO
